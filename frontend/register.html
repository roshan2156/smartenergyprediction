<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Energy Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2ecc71; --primary-dark: #27ae60; --secondary: #3498db; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .register-container { max-width: 500px; width: 100%; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: white; border: none; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .card-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; text-align: center; padding: 30px 20px; }
        .energy-icon { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 30px; border: 3px solid white; animation: pulse 2s infinite; }
        .card-header h2 { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        .card-header p { opacity: 0.9; font-size: 14px; margin: 0; }
        .card-body { padding: 30px; }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #95a5a6; font-size: 14px; pointer-events: none; }
        .form-control { height: 50px; border: 2px solid #e0e0e0; border-radius: 10px; padding-left: 45px; padding-right: 45px; font-size: 14px; width: 100%; }
        .form-control:focus { border-color: var(--primary); outline: none; }
        .password-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: #95a5a6; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .password-toggle:hover { color: var(--primary); background: rgba(46,204,113,0.1); }
        .password-strength { height: 4px; background: #e0e0e0; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .password-strength-bar { height: 100%; width: 0; transition: all 0.3s; }
        .password-strength-text { font-size: 11px; margin-top: 5px; text-align: right; }
        .password-requirements { font-size: 11px; color: #7f8c8d; margin-top: 5px; display: flex; flex-wrap: wrap; gap: 8px; }
        .terms { display: flex; align-items: center; gap: 10px; margin: 20px 0; font-size: 13px; }
        .terms input { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
        .terms a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .btn-register { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 10px; height: 50px; font-weight: 600; font-size: 16px; color: white; width: 100%; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(46,204,113,0.3); }
        .login-link { text-align: center; margin-top: 20px; color: #7f8c8d; font-size: 14px; }
        .login-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .back-home { position: absolute; top: 20px; left: 20px; }
        .back-home a { color: white; text-decoration: none; font-size: 14px; background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 50px; display: inline-block; }
        .alert { border-radius: 10px; font-size: 14px; padding: 12px 20px; margin-bottom: 20px; border: none; }
        .alert-danger { background: #fde8e8; color: #e74c3c; border-left: 4px solid #e74c3c; }
        .alert-success { background: #e8f8f0; color: var(--primary); border-left: 4px solid var(--primary); }
        .spinner-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; justify-content: center; align-items: center; }
        @media (max-width: 576px) { .card-body { padding: 25px 20px; } .card-header { padding: 25px 20px; } .energy-icon { width: 60px; height: 60px; font-size: 28px; } }
    </style>
</head>
<body>
    <div class="back-home"><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></div>
    <div class="register-container">
        <div class="card">
            <div class="card-header">
                <div class="energy-icon"><i class="fas fa-user-plus"></i></div>
                <h2>Create Account</h2>
                <p>Join Smart Energy Monitor today</p>
            </div>
            <div class="card-body">
                <div id="alertContainer"></div>
                <form id="registerForm">
                    <div class="form-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" class="form-control" id="fullname" placeholder="Full Name" required>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="form-control" id="email" placeholder="Email Address" required>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-phone input-icon"></i>
                        <input type="tel" class="form-control" id="phone" placeholder="Phone Number (Optional)">
                    </div>
                    <div class="form-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-control" id="password" placeholder="Password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('password')"><i class="fas fa-eye-slash" id="togglePasswordIcon"></i></button>
                        <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
                        <div class="password-strength-text" id="strengthText"></div>
                        <div class="password-requirements">
                            <span id="reqLength"><i class="fas fa-circle"></i> 8+ characters</span>
                            <span id="reqLower"><i class="fas fa-circle"></i> Lowercase</span>
                            <span id="reqUpper"><i class="fas fa-circle"></i> Uppercase</span>
                            <span id="reqNumber"><i class="fas fa-circle"></i> Number</span>
                            <span id="reqSpecial"><i class="fas fa-circle"></i> Special (!@#$%^&*)</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')"><i class="fas fa-eye-slash" id="toggleConfirmIcon"></i></button>
                    </div>
                    <div class="terms">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the <a href="#" onclick="showTerms(event)">Terms of Service</a> and <a href="#" onclick="showPrivacy(event)">Privacy Policy</a></label>
                    </div>
                    <button type="submit" class="btn-register"><i class="fas fa-user-plus me-2"></i>Create Account</button>
                </form>
                <div class="login-link">Already have an account? <a href="login.html">Sign in</a></div>
            </div>
        </div>
    </div>
    <div class="spinner-overlay" id="spinnerOverlay"><div class="spinner-border text-success" role="status"><span class="visually-hidden">Loading...</span></div><p class="text-white mt-2">Creating your account...</p></div>

    <script>
        const API_URL = window.location.origin + '/api';

        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const iconId = fieldId === 'password' ? 'togglePasswordIcon' : 'toggleConfirmIcon';
            const icon = document.getElementById(iconId);
            if (input.type === 'password') { input.type = 'text'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); }
            else { input.type = 'password'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); }
        }

        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        function checkPasswordStrength(pwd) {
            let strength = 0;
            const req = {
                length: pwd.length >= 8, lower: /[a-z]/.test(pwd), upper: /[A-Z]/.test(pwd),
                number: /[0-9]/.test(pwd), special: /[!@#$%^&*]/.test(pwd)
            };
            document.getElementById('reqLength').innerHTML = req.length ? '<i class="fas fa-check-circle text-success"></i> 8+ characters' : '<i class="fas fa-circle"></i> 8+ characters';
            document.getElementById('reqLower').innerHTML = req.lower ? '<i class="fas fa-check-circle text-success"></i> Lowercase' : '<i class="fas fa-circle"></i> Lowercase';
            document.getElementById('reqUpper').innerHTML = req.upper ? '<i class="fas fa-check-circle text-success"></i> Uppercase' : '<i class="fas fa-circle"></i> Uppercase';
            document.getElementById('reqNumber').innerHTML = req.number ? '<i class="fas fa-check-circle text-success"></i> Number' : '<i class="fas fa-circle"></i> Number';
            document.getElementById('reqSpecial').innerHTML = req.special ? '<i class="fas fa-check-circle text-success"></i> Special (!@#$%^&*)' : '<i class="fas fa-circle"></i> Special (!@#$%^&*)';
            if (req.length) strength += 25; if (req.lower) strength += 20; if (req.upper) strength += 20; if (req.number) strength += 20; if (req.special) strength += 15;
            return Math.min(strength, 100);
        }

        passwordInput.addEventListener('input', function() {
            const strength = checkPasswordStrength(this.value);
            strengthBar.style.width = strength + '%';
            if (strength < 30) { strengthBar.style.background = '#e74c3c'; strengthText.textContent = 'Weak password'; strengthText.style.color = '#e74c3c'; }
            else if (strength < 60) { strengthBar.style.background = '#f39c12'; strengthText.textContent = 'Medium password'; strengthText.style.color = '#f39c12'; }
            else if (strength < 80) { strengthBar.style.background = '#3498db'; strengthText.textContent = 'Strong password'; strengthText.style.color = '#3498db'; }
            else { strengthBar.style.background = '#2ecc71'; strengthText.textContent = 'Very strong password'; strengthText.style.color = '#2ecc71'; }
        });

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.innerHTML = `<i class="fas fa-${type === 'danger' ? 'exclamation-circle' : 'check-circle'} me-2"></i>${message}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
            container.innerHTML = ''; container.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 5000);
        }

        function showTerms(e) { e.preventDefault(); showAlert('Terms of Service: By using Smart Energy Monitor, you agree to our terms and conditions.', 'info'); }
        function showPrivacy(e) { e.preventDefault(); showAlert('Privacy Policy: Your data is secure and never shared with third parties.', 'info'); }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const phone = document.getElementById('phone').value.trim();
            const terms = document.getElementById('terms').checked;
            
            if (!fullname || !email || !password) { showAlert('All fields required!', 'danger'); return; }
            if (password !== confirmPassword) { showAlert('Passwords do not match!', 'danger'); return; }
            if (!terms) { showAlert('Please agree to terms', 'danger'); return; }
            
            const passwordValid = password.length >= 8 && /[a-z]/.test(password) && /[A-Z]/.test(password) && /[0-9]/.test(password) && /[!@#$%^&*]/.test(password);
            if (!passwordValid) { showAlert('Password must be 8+ chars with uppercase, lowercase, number & special character', 'danger'); return; }
            
            document.getElementById('spinnerOverlay').style.display = 'flex';
            
            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: fullname, email, password, phone })
                });
                const result = await response.json();
                document.getElementById('spinnerOverlay').style.display = 'none';
                
                if (result.success) {
                    showAlert('Registration successful! Redirecting to login...', 'success');
                    setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                } else {
                    showAlert(result.message || 'Registration failed!', 'danger');
                }
            } catch (error) {
                document.getElementById('spinnerOverlay').style.display = 'none';
                showAlert('Cannot connect to server. Make sure backend is running on port 5000', 'danger');
            }
        });

        window.onload = function() { document.getElementById('fullname').focus(); };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
