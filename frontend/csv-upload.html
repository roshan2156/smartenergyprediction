<script>
    let analysisData = {};
    let globalRecords = [];

    function getUser() { return authManager.getCurrentUser(); }

    function updateUserUI() {
        try {
            const user = getUser();
            if (!user || !user.name) { 
                document.getElementById('userNameDisplay').textContent = 'Guest User'; 
                document.getElementById('avatarInitial').textContent = 'GU'; 
                return; 
            }
            document.getElementById('userNameDisplay').textContent = user.name;
            const initials = user.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            document.getElementById('avatarInitial').textContent = initials;
        } catch (e) {
            console.error("UI Error:", e);
        }
    }

    function logout() {
        if (confirm('Are you sure you want to logout?')) {
            authManager.logout();
        }
    }

    function downloadSampleCSV() {
        const sampleData = `timestamp,power_consumption_W,usage_duration_minutes,appliance,occupancy_status,temperature_setting_C
2026-03-20 08:00:00,1500,60,AC,Occupied,24
2026-03-20 09:00:00,70,120,Fan,Occupied,24
2026-03-20 12:00:00,200,180,Fridge,Occupied,22
2026-03-20 18:00:00,500,45,Washing Machine,Occupied,25
2026-03-20 19:30:00,1500,90,AC,Occupied,24
2026-03-20 20:00:00,40,240,Light,Occupied,24
2026-03-20 21:00:00,70,180,Fan,Occupied,24
2026-03-21 08:00:00,1500,60,AC,Occupied,24
2026-03-21 19:00:00,1500,120,AC,Occupied,24
2026-03-21 20:30:00,40,180,Light,Occupied,24`;
        const blob = new Blob([sampleData], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'sample_energy_data.csv';
        link.click();
    }

    function getSeasonFromDate(dateString) {
        try {
            const date = new Date(dateString);
            const month = date.getMonth() + 1;
            if ([3, 4, 5].includes(month)) return "Summer";
            if ([6, 7, 8].includes(month)) return "Monsoon";
            if ([9, 10].includes(month)) return "Autumn";
            if ([11, 12].includes(month)) return "Winter";
            return "Spring";
        } catch(e) { return "Spring"; }
    }

    function getApplianceCategory(name) {
        if (!name) return "General";
        name = name.toLowerCase();
        if (name.includes('ac') || name.includes('fan')) return 'Cooling';
        if (name.includes('light')) return 'Lighting';
        if (name.includes('fridge')) return 'Kitchen';
        if (name.includes('washing')) return 'Laundry';
        return 'General';
    }

    async function handleFileUpload(file) {
        if (!file) return;

        const userId = authManager.getUserId();
        const userName = authManager.getUserName();

        document.getElementById('uploadSection').style.display = 'none';
        document.getElementById('loadingSpinner').style.display = 'block';

        const reader = new FileReader();

        reader.onload = async function(e) {
            try {
                const csvData = e.target.result;
                const rows = csvData.split('\n').slice(1, 200).filter(row => row.trim());
                const records = [];

                for (let row of rows) {
                    const cols = row.split(',');
                    if (cols.length >= 6) {
                        const dateObj = new Date(cols[0]);
                        records.push({
                            power_consumption_W: parseFloat(cols[1]) || 0,
                            usage_duration_minutes: parseFloat(cols[2]) || 0,
                            appliance: (cols[3] || '').trim() || 'Unknown',
                            occupancy_status: (cols[4] || '').trim() || 'Occupied',
                            temperature_setting_C: parseFloat(cols[5]) || 24,
                            hour: isNaN(dateObj) ? 12 : dateObj.getHours(),
                            day_of_week: isNaN(dateObj) ? "Monday" : ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dateObj.getDay()],
                            season: getSeasonFromDate(cols[0]),
                            room_location: 'Living Room',
                            appliance_category: getApplianceCategory(cols[3])
                        });
                    }
                }

                globalRecords = records;

                if (records.length === 0) {
                    throw new Error("CSV file is empty or invalid format");
                }

                const response = await fetch(`${API_URL}/batch_predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        user_name: userName,
                        mode: 'csv',
                        records: records
                    })
                });

                if (!response.ok) throw new Error("Network error: Server did not respond correctly");

                const result = await response.json();

                // ✅ ULTRA SAFE: Check if result is valid at all
                if (!result) throw new Error("Server returned empty data");
                if (result.success === false) throw new Error(result.error || "Prediction failed on server");

                // ✅ ULTRA SAFE: Force objects to never be null
                const safeAppUsage = (result.appliance_usage && typeof result.appliance_usage === 'object' && !Array.isArray(result.appliance_usage)) ? result.appliance_usage : {};
                const safeHourUsage = (result.hourly_usage && typeof result.hourly_usage === 'object' && !Array.isArray(result.hourly_usage)) ? result.hourly_usage : {};

                const dailyMap = {};
                globalRecords.forEach(r => {
                    const day = r.day_of_week;
                    const energy = (r.power_consumption_W * r.usage_duration_minutes) / 60000;
                    dailyMap[day] = (dailyMap[day] || 0) + energy;
                });

                const hourMap = {};
                globalRecords.forEach(r => {
                    hourMap[r.hour] = (hourMap[r.hour] || 0) + (r.power_consumption_W * r.usage_duration_minutes / 60000);
                });

                analysisData = {
                    totalEnergy: result.total_energy || 0,
                    totalCost: result.total_cost || 0,
                    totalCarbon: result.total_carbon || 0,
                    avgDailyEnergy: (result.total_energy / 7).toFixed(2) || 0,
                    applianceUsage: safeAppUsage,
                    hourlyUsage: safeHourUsage,
                    roomUsage: {},
                    peakHours: [],
                    alerts: [],
                    recommendations: [],
                    waste: [],
                    dataCount: records.length,
                    efficiencyScore: 80,
                    // ✅ NO DESTRUCTURING HERE (prevents null errors)
                    chartData_dailyTrend: { labels: Object.keys(dailyMap), values: Object.values(dailyMap) },
                    chartData_hourlyUsage: { labels: Object.keys(hourMap).sort((a,b) => a-b), values: Object.keys(hourMap).sort((a,b) => a-b).map(k => hourMap[k]) },
                    chartData_applianceUsage: { labels: Object.keys(safeAppUsage), values: Object.values(safeAppUsage) },
                    chartData_roomUsage: { labels: [], values: [] }
                };

                analysisData.mode = 'csv';
                analysisData.timestamp = new Date().toISOString();

                try {
                    localStorage.setItem('latestPrediction', JSON.stringify(analysisData));
                } catch (storageErr) {
                    console.warn("Could not save to localStorage:", storageErr);
                }

                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('resultsSection').style.display = 'block';

                displayResults(analysisData);

            } catch (err) {
                console.error("Upload Error:", err);
                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('uploadSection').style.display = 'block';
                alert("❌ Error: " + err.message);
            }
        };

        reader.readAsText(file);
    }

    // ✅ WRAPPED IN TRY-CATCH TO PREVENT WHITE SCREEN OF DEATH
    function displayResults(data) {
        try {
            if (!data || typeof data !== 'object') {
                alert("No valid data to display.");
                return;
            }

            const alerts = Array.isArray(data.alerts) ? data.alerts : [];
            const recommendations = Array.isArray(data.recommendations) ? data.recommendations : [];
            const waste = Array.isArray(data.waste) ? data.waste : [];
            const peakHours = Array.isArray(data.peakHours) ? data.peakHours : [];
            
            // ✅ FORCE EMPTY OBJECT IF NULL
            const applianceUsage = (data.applianceUsage && typeof data.applianceUsage === 'object') ? data.applianceUsage : {};
            const roomUsage = (data.roomUsage && typeof data.roomUsage === 'object') ? data.roomUsage : {};

            document.getElementById('totalEnergy').textContent = data.totalEnergy || 0;
            document.getElementById('totalCost').textContent = `₹${data.totalCost || 0}`;
            document.getElementById('totalCarbon').textContent = data.totalCarbon || 0;
            document.getElementById('avgEnergy').textContent = data.avgDailyEnergy || 0;

            // Build maps safely from globalRecords
            const dailyMap = {};
            if (Array.isArray(globalRecords)) {
                globalRecords.forEach(r => {
                    if(r.day_of_week) {
                        const energy = (r.power_consumption_W * r.usage_duration_minutes) / 60000;
                        dailyMap[r.day_of_week] = (dailyMap[r.day_of_week] || 0) + energy;
                    }
                });
            }

            const hourMap = {};
            if (Array.isArray(globalRecords)) {
                globalRecords.forEach(r => {
                    if(r.hour != null) {
                        hourMap[r.hour] = (hourMap[r.hour] || 0) + (r.power_consumption_W * r.usage_duration_minutes / 60000);
                    }
                });
            }

            // Charts Initialization (Safe check for canvas)
            const dailyCtx = document.getElementById('dailyTrendChart')?.getContext('2d');
            if (dailyCtx) {
                new Chart(dailyCtx, {
                    type: 'line',
                    data: { labels: Object.keys(dailyMap), datasets: [{ label: 'Energy (kWh)', data: Object.values(dailyMap), borderColor: '#2ecc71', backgroundColor: 'rgba(46,204,113,0.1)', tension: 0.4, fill: true }] },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            }

            const appCtx = document.getElementById('applianceChart')?.getContext('2d');
            if (appCtx) {
                new Chart(appCtx, {
                    type: 'doughnut',
                    data: { labels: Object.keys(applianceUsage), datasets: [{ data: Object.values(applianceUsage), backgroundColor: ['#2ecc71', '#3498db', '#f39c12', '#e74c3c', '#9b59b6'] }] }
                });
            }

            const peakCtx = document.getElementById('peakHourChart')?.getContext('2d');
            if (peakCtx) {
                const hours = Object.keys(hourMap).sort((a,b) => a-b);
                const hourValues = hours.map(h => hourMap[h]);
                new Chart(peakCtx, {
                    type: 'bar',
                    data: { labels: hours, datasets: [{ label: 'Energy (kWh)', data: hourValues, backgroundColor: '#f39c12' }] }
                });
            }

            const roomCtx = document.getElementById('roomChart')?.getContext('2d');
            if (roomCtx) {
                new Chart(roomCtx, {
                    type: 'bar',
                    data: { labels: Object.keys(roomUsage), datasets: [{ label: 'Energy (kWh)', data: Object.values(roomUsage), backgroundColor: '#3498db' }] }
                });
            }

            document.getElementById('alertsList').innerHTML =
                alerts.map(a => `<div class="alert-card alert-${a.type || 'info'}"><i class="fas fa-${a.type === 'danger' ? 'exclamation-circle' : 'info-circle'} me-2"></i>${a.message || a}</div>`).join('') || '<p class="text-success">✅ No critical alerts detected.</p>';

            document.getElementById('recommendationsList').innerHTML =
                recommendations.map(r => `<div class="rec-card"><i class="fas fa-check-circle text-success me-2"></i>${r}</div>`).join('') || '<p class="text-muted">No specific recommendations.</p>';

            document.getElementById('wasteList').innerHTML =
                waste.map(w => `<div class="alert-card alert-danger"><i class="fas fa-trash-alt me-2"></i>${w}</div>`).join('') || '<p class="text-success">✅ No waste detected!</p>';

            let highestUsage = 'N/A';
            try {
                const sortedAppliances = Object.entries(applianceUsage).sort((a,b) => b[1] - a[1]);
                if (sortedAppliances.length > 0) highestUsage = sortedAppliances[0][0];
            } catch (e) { highestUsage = 'N/A'; }

            document.getElementById('detailedReport').innerHTML = `
                <p><strong>Analysis Summary:</strong> ${data.dataCount || 0} records analyzed</p>
                <p><strong>Efficiency Score:</strong> ${data.efficiencyScore || 0}%</p>
                <p><strong>Peak Hours:</strong> ${peakHours.length > 0 ? peakHours.join(', ') + ':00' : 'None'}</p>
                <p><strong>Highest Usage:</strong> ${highestUsage}</p>
                <p><strong>Monthly Savings:</strong> ₹${((data.totalCost || 0) * 0.2).toFixed(2)}</p>
            `;

        } catch (err) {
            console.error("Display Error:", err);
            alert("❌ Error displaying results: " + err.message);
        }
    }

    function downloadReport() {
        try {
            const alerts = Array.isArray(analysisData.alerts) ? analysisData.alerts : [];
            const recommendations = Array.isArray(analysisData.recommendations) ? analysisData.recommendations : [];
            const waste = Array.isArray(analysisData.waste) ? analysisData.waste : [];
            const peakHours = Array.isArray(analysisData.peakHours) ? analysisData.peakHours : [];

            const reportContent = `SMART ENERGY MONITOR - CSV ANALYSIS REPORT\nDate: ${new Date().toLocaleString()}\nTotal Energy: ${analysisData.totalEnergy || 0} kWh\nCost: ₹${analysisData.totalCost || 0}\nCarbon: ${analysisData.totalCarbon || 0} kg CO₂\n\nALERTS:\n${alerts.map(a => '- ' + (a.message || a)).join('\n')}\n\nRECOMMENDATIONS:\n${recommendations.map(r => '- ' + r).join('\n')}`;
            
            const blob = new Blob([reportContent], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `energy_report_${new Date().toISOString().slice(0,19)}.txt`;
            link.click();
        } catch(e) {
            alert("Could not download report.");
        }
    }

    function saveToHistory() {
        try {
            if (!analysisData || !analysisData.totalEnergy) {
                alert("❌ No analysis data available.");
                return;
            }
            const user = authManager.getCurrentUser();
            const userId = user ? (user.id || user.name) : 'guest';
            let reports = JSON.parse(localStorage.getItem(`csvReports_${userId}`) || '[]');

            reports.push({
                id: Date.now(),
                timestamp: new Date().toISOString(),
                mode: 'csv',
                totalEnergy: analysisData.totalEnergy,
                totalCost: analysisData.totalCost,
                totalCarbon: analysisData.totalCarbon,
                efficiencyScore: analysisData.efficiencyScore || 80,
                alerts: (analysisData.alerts || []).map(a => a.message || a),
                recommendations: analysisData.recommendations || [],
                chartData: {
                    type: 'csv',
                    dailyTrend: analysisData.chartData_dailyTrend || { labels: [], values: [] },
                    applianceUsage: analysisData.chartData_applianceUsage || { labels: [], values: [] },
                    hourlyUsage: analysisData.chartData_hourlyUsage || { labels: [], values: [] },
                    roomUsage: analysisData.chartData_roomUsage || { labels: [], values: [] }
                }
            });

            localStorage.setItem(`csvReports_${userId}`, JSON.stringify(reports));
            alert('✅ CSV Report saved to Reports page!');
        } catch(e) {
            alert("❌ Could not save to history. LocalStorage might be full.");
        }
    }

    document.addEventListener('DOMContentLoaded', function () { 
        updateUserUI(); 
    });
</script>
