<!DOCTYPE html>
<html lang="en">
<head>
    <script src="js/auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Input - Smart Energy System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-icon i {
            font-size: 22px;
            color: white;
        }

        .logo-text h2 {
            font-size: 22px;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text p {
            font-size: 10px;
            margin: 0;
            color: #7f8c8d;
        }

        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            transition: width 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: #2ecc71;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #f8f9fa;
            padding: 8px 20px;
            border-radius: 50px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .user-name {
            font-weight: 600;
            color: #2c3e50;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1400px;
            margin: 100px auto 50px;
            padding: 20px;
        }

        .form-section {
            background: white;
            border-radius: 25px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #2ecc71;
        }

        .appliance-block {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .appliance-block:hover {
            border-color: #2ecc71;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .remove-appliance {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .remove-appliance:hover {
            background: #c0392b;
            transform: scale(1.1);
        }

        .prediction-type {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .pred-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pred-btn.active {
            border-color: #2ecc71;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            color: white;
        }

        .pred-btn:hover {
            border-color: #2ecc71;
            transform: translateY(-3px);
        }

        .result-card {
            background: linear-gradient(135deg, #2ecc71, #3498db);
            color: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .forecast-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
        }

        .alert-card {
            border-left: 4px solid;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            background: #f8f9fa;
        }

        .alert-warning {
            border-left-color: #f39c12;
        }

        .alert-danger {
            border-left-color: #e74c3c;
        }

        .alert-success {
            border-left-color: #2ecc71;
        }

        .alert-info {
            border-left-color: #3498db;
        }

        .rec-card {
            background: linear-gradient(135deg, #f8f9fa, #fff);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.3s;
            border-left: 4px solid #2ecc71;
        }

        .rec-card:hover {
            transform: translateX(5px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 15px;
                padding: 15px 20px;
            }
            
            .nav-links {
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .container {
                margin-top: 160px;
            }
            
            .appliance-block .row {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="nav-container">
        <a href="home.html" class="logo">
            <div class="logo-icon">
                <i class="fas fa-bolt"></i>
            </div>
            <div class="logo-text">
                <h2>Smart Energy System</h2>
                <p>AI-Powered Energy Intelligence</p>
            </div>
        </a>
        
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="history.html">History</a></li>
        </ul>
        
        <div class="user-info" id="userInfo">
            <div class="user-avatar" id="userAvatar">
                <span id="avatarInitial">JD</span>
            </div>
            <span class="user-name" id="userNameDisplay">Loading...</span>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>
</header>

<div class="container">
    <div class="form-section">
        <h3 class="section-title"><i class="fas fa-edit me-2"></i>Manual Energy Entry</h3>
        
        <div class="row mb-4">
            <div class="col-md-4">
                <label class="form-label fw-bold"><i class="fas fa-calendar"></i> Date</label>
                <input type="date" class="form-control" id="inputDate" value="2026-03-26">
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold"><i class="fas fa-clock"></i> Time</label>
                <input type="time" class="form-control" id="inputTime" value="19:30">
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold"><i class="fas fa-thermometer-half"></i> Temperature Setting (°C)</label>
                <input type="number" class="form-control" id="temperatureSetting" value="24">
            </div>
        </div>
        
        <div class="row mb-4">
            <div class="col-md-6">
                <label class="form-label fw-bold"><i class="fas fa-users"></i> Occupancy Status</label>
                <select class="form-select" id="occupancyStatus">
                    <option value="Occupied">Occupied 👤</option>
                    <option value="Vacant">Vacant 🏠</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold"><i class="fas fa-calendar-week"></i> Day Type</label>
                <select class="form-select" id="dayType">
                    <option value="Weekday">Weekday</option>
                    <option value="Weekend">Weekend</option>
                    <option value="Holiday">Holiday</option>
                </select>
            </div>
        </div>
        
        <div class="mt-4">
            <h5 class="fw-bold mb-3"><i class="fas fa-plug me-2"></i>Appliances</h5>
            <button class="btn btn-success mb-3" id="addApplianceBtn">
                <i class="fas fa-plus"></i> Add Appliance
            </button>
            <div id="appliancesContainer">
                <div class="appliance-block" data-idx="0">
                    <button class="remove-appliance" style="display: none;">×</button>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">Appliance Type</label>
                            <select class="form-select appliance-select">
                                <option value="AC">❄️ AC</option>
                                <option value="Fan">🌀 Fan</option>
                                <option value="Light">💡 Light</option>
                                <option value="Fridge">🧊 Fridge</option>
                                <option value="Washing Machine">🧺 Washing Machine</option>
                                <option value="TV">📺 TV</option>
                                <option value="Heater">🔥 Heater</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Power (Watts)</label>
                            <input type="number" class="form-control power-input" value="1500" step="10">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Duration (mins)</label>
                            <input type="number" class="form-control duration-input" value="60" step="5">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Room Location</label>
                            <select class="form-select room-select">
                                <option>Living Room</option>
                                <option>Bedroom</option>
                                <option>Kitchen</option>
                                <option>Hall</option>
                                <option>Study Room</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Quantity</label>
                            <input type="number" class="form-control quantity-input" value="1" min="1" max="10">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-4">
            <label class="form-label fw-bold"><i class="fas fa-chart-line"></i> Prediction Type</label>
            <div class="prediction-type">
                <div class="pred-btn active" data-type="instant" onclick="selectPredictionType('instant')">
                    <i class="fas fa-bolt fa-2x"></i>
                    <div class="mt-2"><strong>Instant Prediction</strong></div>
                    <small>Single time prediction</small>
                </div>
                <div class="pred-btn" data-type="forecast" onclick="selectPredictionType('forecast')">
                    <i class="fas fa-chart-line fa-2x"></i>
                    <div class="mt-2"><strong>Future Forecast</strong></div>
                    <small>Predict future usage</small>
                </div>
            </div>
        </div>
        
        <div id="forecastOptions" style="display: none;" class="mt-3">
            <label class="form-label fw-bold"><i class="fas fa-calendar-alt"></i> Forecast Period</label>
            <div class="row">
                <div class="col-md-4">
                    <button class="btn btn-outline-primary w-100 forecast-period-btn" data-period="7">7 Days</button>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-outline-primary w-100 forecast-period-btn" data-period="30">30 Days</button>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-outline-primary w-100 forecast-period-btn" data-period="365">1 Year</button>
                </div>
            </div>
            <input type="hidden" id="selectedPeriod" value="7">
        </div>
        
        <button class="btn btn-primary btn-lg w-100 mt-4" id="predictBtn" onclick="makePrediction()">
            <i class="fas fa-chart-line"></i> Predict Energy Usage
        </button>
    </div>
    
    <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner-border text-success" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3 text-white">Calculating predictions with LSTM model...</p>
    </div>
    
    <div id="resultsSection" style="display: none;"></div>
</div>

<script>
    let applianceCount = 1;
    let currentPredictionType = 'instant';
    let currentPeriod = 7;
    let latestPredictionData = null;

    function getUserData() {
        let userName = localStorage.getItem('userName');
        if (!userName) userName = sessionStorage.getItem('userName');
        if (!userName) userName = 'Guest User';
        return { userName };
    }
    
    function updateUserUI() {
        const user = authManager.getCurrentUser();
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        const name = user.name;
        document.getElementById('userNameDisplay').textContent = name;
        const words = name.trim().split(' ');
        let initials = '';
        if (words.length === 1) {
            initials = words[0].substring(0, 2);
        } else {
            initials = words[0][0] + words[words.length - 1][0];
        }
        document.getElementById('avatarInitial').textContent = initials.toUpperCase();
    }

    function logout() {
        if (confirm('Are you sure you want to logout?')) {
            authManager.logout();
        }
    }
    
    document.getElementById('addApplianceBtn').addEventListener('click', () => {
        const container = document.getElementById('appliancesContainer');
        const newBlock = document.createElement('div');
        newBlock.className = 'appliance-block';
        newBlock.setAttribute('data-idx', applianceCount);
        newBlock.innerHTML = `
            <button class="remove-appliance">×</button>
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Appliance Type</label>
                    <select class="form-select appliance-select">
                        <option value="AC">❄️ AC</option>
                        <option value="Fan">🌀 Fan</option>
                        <option value="Light">💡 Light</option>
                        <option value="Fridge">🧊 Fridge</option>
                        <option value="Washing Machine">🧺 Washing Machine</option>
                        <option value="TV">📺 TV</option>
                        <option value="Heater">🔥 Heater</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Power (Watts)</label>
                    <input type="number" class="form-control power-input" value="100" step="10">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Duration (mins)</label>
                    <input type="number" class="form-control duration-input" value="30" step="5">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Room Location</label>
                    <select class="form-select room-select">
                        <option>Living Room</option>
                        <option>Bedroom</option>
                        <option>Kitchen</option>
                        <option>Hall</option>
                        <option>Study Room</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Quantity</label>
                    <input type="number" class="form-control quantity-input" value="1" min="1" max="10">
                </div>
            </div>
        `;
        container.appendChild(newBlock);
        newBlock.querySelector('.remove-appliance').addEventListener('click', () => newBlock.remove());
        applianceCount++;
    });
    
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('remove-appliance')) {
            e.target.parentElement.remove();
        }
    });

    function downloadCSVReport() {
        if (!latestPredictionData) {
            alert("No data to download");
            return;
        }

        const csv = `Energy,Cost,Carbon\n${latestPredictionData.totalEnergy},${latestPredictionData.totalCost},${latestPredictionData.totalCarbon}`;

        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `report_${Date.now()}.csv`;
        link.click();
    }
    
    function selectPredictionType(type) {
        currentPredictionType = type;
        document.querySelectorAll('.pred-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.pred-btn[data-type="${type}"]`).classList.add('active');
        document.getElementById('forecastOptions').style.display = type === 'forecast' ? 'block' : 'none';
    }
    
    document.querySelectorAll('.forecast-period-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.forecast-period-btn').forEach(b => {
                b.classList.remove('btn-primary');
                b.classList.add('btn-outline-primary');
            });
            btn.classList.remove('btn-outline-primary');
            btn.classList.add('btn-primary');
            currentPeriod = parseInt(btn.dataset.period);
        });
    });
    
    function generateDynamicAlerts(energy, isPeakHour, temp, occupancy, appliances, hour) {
        const alerts = [];
        if (isPeakHour) {
            alerts.push({ type: 'warning', message: `⚠️ Peak hour detected (${hour}:00). Electricity rates are higher during 6-10 PM.` });
        }
        if (energy > 8) {
            alerts.push({ type: 'danger', message: `🔥 Very high energy consumption (${energy.toFixed(2)} kWh)!` });
        } else if (energy > 5) {
            alerts.push({ type: 'warning', message: `⚠️ High energy consumption (${energy.toFixed(2)} kWh).` });
        } else if (energy < 2) {
            alerts.push({ type: 'success', message: `✅ Excellent! Low energy consumption (${energy.toFixed(2)} kWh).` });
        }
        
        const hasAC = appliances.some(a => a.name === 'AC');
        if (hasAC && temp < 22) {
            alerts.push({ type: 'info', message: `❄️ AC set to ${temp}°C (too low). Raise to 24°C to save energy.` });
        }
        if (occupancy === 'Vacant' && energy > 2) {
            alerts.push({ type: 'danger', message: `🏠 Vacant property but high energy consumption detected!` });
        }
        return alerts;
    }
    
    function generateDynamicRecommendations(energy, isPeakHour, temp, occupancy, appliances, hour, dayType) {
        const recommendations = [];
        if (isPeakHour) {
            recommendations.push(`⏰ Shift usage to morning hours (8-11 AM) to avoid peak rates.`);
        }
        if (energy > 5) {
            recommendations.push(`💡 Reduce total energy by 20% by unplugging idle devices.`);
        }
        const acAppliance = appliances.find(a => a.name === 'AC');
        if (acAppliance) {
            recommendations.push(`❄️ Set AC to 24°C for optimal efficiency.`);
        }
        if (recommendations.length < 2) {
            recommendations.push(`🔌 Unplug electronics when not in use.`);
        }
        return recommendations;
    }
    
    function lstmPrediction(appliances, hour, temp, occupancy, dayType) {
        let baseEnergy = 0;
        appliances.forEach(app => {
            baseEnergy += (app.power * (app.duration / 60) * app.quantity) / 1000;
        });
        let adjustedEnergy = baseEnergy;
        if (hour >= 18 && hour <= 22) adjustedEnergy *= 1.25;
        const hasAC = appliances.some(a => a.name === 'AC');
        if (hasAC && temp < 22) adjustedEnergy *= 1.15;
        if (occupancy === 'Vacant') adjustedEnergy *= 0.6;
        if (dayType === 'Weekend' || dayType === 'Holiday') adjustedEnergy *= 1.1;
        return Math.max(0.1, adjustedEnergy);
    }
    
    function makePrediction() {
        const dateStr = document.getElementById('inputDate').value;
        const timeStr = document.getElementById('inputTime').value;
        const temp = parseFloat(document.getElementById('temperatureSetting').value);
        const occupancy = document.getElementById('occupancyStatus').value;
        const dayType = document.getElementById('dayType').value;
        const hour = parseInt(timeStr.split(':')[0]);
        const isPeakHour = (hour >= 18 && hour <= 22);

        const applianceBlocks = document.querySelectorAll('.appliance-block');
        const appliances = [];
        applianceBlocks.forEach(block => {
            appliances.push({
                name: block.querySelector('.appliance-select').value,
                power: parseFloat(block.querySelector('.power-input').value),
                duration: parseFloat(block.querySelector('.duration-input').value),
                room: block.querySelector('.room-select').value,
                quantity: parseInt(block.querySelector('.quantity-input').value)
            });
        });

        document.getElementById('loadingSpinner').style.display = 'block';
        document.getElementById('resultsSection').style.display = 'none';

        setTimeout(() => {
            const energy = lstmPrediction(appliances, hour, temp, occupancy, dayType);
            const cost = energy * 7;
            const carbon = energy * 0.5;
            const alerts = generateDynamicAlerts(energy, isPeakHour, temp, occupancy, appliances, hour);
            const recommendations = generateDynamicRecommendations(energy, isPeakHour, temp, occupancy, appliances, hour, dayType);

            latestPredictionData = {
                totalEnergy: energy,
                totalCost: cost,
                totalCarbon: carbon,
                appliances: appliances,
                isPeakHour: isPeakHour,
                temp: temp,
                occupancy: occupancy,
                hour: hour,
                dayType: dayType
            };

            document.getElementById('loadingSpinner').style.display = 'none';

            if (currentPredictionType === 'instant') {
                displayInstantResult(energy, cost, carbon, isPeakHour, alerts, recommendations, appliances, occupancy, temp, hour, dayType);
            } else {
                displayForecastResult(energy, cost, carbon, currentPeriod, appliances, alerts, recommendations, hour, dayType);
            }
        }, 1500);
    }
    
    function displayInstantResult(energy, cost, carbon, isPeakHour, alerts, recommendations, appliances, occupancy, temp, hour, dayType) {
        const resultHtml = `
            <div class="form-section">
                <h3 class="section-title"><i class="fas fa-chart-line me-2"></i>LSTM Prediction Result</h3>
                <div class="result-card">
                    <div class="row text-center">
                        <div class="col-md-4"><i class="fas fa-bolt fa-3x"></i><div class="stat-value mt-2">${energy.toFixed(2)} kWh</div><small>Total Energy</small></div>
                        <div class="col-md-4"><i class="fas fa-rupee-sign fa-3x"></i><div class="stat-value mt-2">₹${cost.toFixed(2)}</div><small>Estimated Cost</small></div>
                        <div class="col-md-4"><i class="fas fa-leaf fa-3x"></i><div class="stat-value mt-2">${carbon.toFixed(2)} kg</div><small>Carbon Emission</small></div>
                    </div>
                </div>
                <div class="mt-4">
                    <h5><i class="fas fa-bell text-warning"></i> Alerts</h5>
                    ${alerts.map(alert => `<div class="alert-card alert-${alert.type}">${alert.message}</div>`).join('')}
                </div>
                <div class="mt-4">
                    <h5><i class="fas fa-lightbulb text-success"></i> Recommendations</h5>
                    ${recommendations.map(rec => `<div class="rec-card"><i class="fas fa-check-circle text-success me-2"></i>${rec}</div>`).join('')}
                </div>
                <div class="mt-4 text-center">
                    <button class="btn btn-success" onclick="downloadInstantReport(${energy}, ${cost}, ${carbon}, '${isPeakHour}')">
                        <i class="fas fa-download"></i> Download Report
                    </button>
                    <button class="btn btn-primary ms-2" onclick="savePredictionToHistory()">
                        <i class="fas fa-save"></i> Save to History
                    </button>
                </div>
            </div>
        `;
        document.getElementById('resultsSection').innerHTML = resultHtml;
        document.getElementById('resultsSection').style.display = 'block';
        document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
    }
    
    function displayForecastResult(dailyEnergy, dailyCost, dailyCarbon, days, appliances, alerts, recommendations, hour, dayType) {
        const totalEnergy = dailyEnergy * days;
        const totalCost = dailyCost * days;
        const totalCarbon = dailyCarbon * days;
        
        const resultHtml = `
            <div class="form-section">
                <h3 class="section-title"><i class="fas fa-chart-line me-2"></i>LSTM Forecast Report (${days} Days)</h3>
                <div class="result-card">
                    <div class="row text-center">
                        <div class="col-md-4"><i class="fas fa-bolt fa-3x"></i><div class="stat-value mt-2">${totalEnergy.toFixed(2)} kWh</div><small>Total Projected Energy</small></div>
                        <div class="col-md-4"><i class="fas fa-rupee-sign fa-3x"></i><div class="stat-value mt-2">₹${totalCost.toFixed(2)}</div><small>Total Projected Cost</small></div>
                        <div class="col-md-4"><i class="fas fa-leaf fa-3x"></i><div class="stat-value mt-2">${totalCarbon.toFixed(2)} kg</div><small>Total Projected Carbon</small></div>
                    </div>
                </div>
                <div class="mt-4 text-center">
                    <button class="btn btn-success" onclick="downloadForecastReport(${totalEnergy}, ${totalCost}, ${totalCarbon}, ${days})">
                        <i class="fas fa-download"></i> Download Report
                    </button>
                    <button class="btn btn-primary ms-2" onclick="savePredictionToHistory()">
                        <i class="fas fa-save"></i> Save to History
                    </button>
                </div>
            </div>
        `;
        document.getElementById('resultsSection').innerHTML = resultHtml;
        document.getElementById('resultsSection').style.display = 'block';
        document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
    }

    function savePredictionToHistory() {
        if (!latestPredictionData) {
            alert("No prediction data available.");
            return;
        }

        const user = authManager.getCurrentUser();
        const userId = user ? (user.id || user.name) : 'guest';

        let reports = JSON.parse(
            localStorage.getItem(`manualReports_${userId}`) || '[]'
        );

        let efficiencyScore = 80;
        if (latestPredictionData.totalEnergy < 3) efficiencyScore = 95;
        else if (latestPredictionData.totalEnergy > 8) efficiencyScore = 50;
        else if (latestPredictionData.totalEnergy > 5) efficiencyScore = 70;

        const alertMessages = generateDynamicAlerts(
            latestPredictionData.totalEnergy,
            latestPredictionData.isPeakHour,
            latestPredictionData.temp,
            latestPredictionData.occupancy,
            latestPredictionData.appliances,
            latestPredictionData.hour
        ).map(a => a.message);

        const recMessages = generateDynamicRecommendations(
            latestPredictionData.totalEnergy,
            latestPredictionData.isPeakHour,
            latestPredictionData.temp,
            latestPredictionData.occupancy,
            latestPredictionData.appliances,
            latestPredictionData.hour,
            latestPredictionData.dayType
        );

        const report = {
            id: Date.now(),
            timestamp: new Date().toISOString(),
            mode: 'manual',

            totalEnergy: latestPredictionData.totalEnergy,
            totalCost: latestPredictionData.totalCost,
            totalCarbon: latestPredictionData.totalCarbon,
            efficiencyScore: efficiencyScore,

            alerts: alertMessages,
            recommendations: recMessages
        };

        reports.push(report);

        localStorage.setItem(
            `manualReports_${userId}`,
            JSON.stringify(reports)
        );

        // ✅ STEP: Save unified latestPrediction for dashboard
        localStorage.setItem('latestPrediction', JSON.stringify({
            mode: 'manual',
            totalEnergy: latestPredictionData.totalEnergy,
            totalCost: latestPredictionData.totalCost,
            totalCarbon: latestPredictionData.totalCarbon,
            efficiencyScore: efficiencyScore,
            alerts: alertMessages,
            recommendations: recMessages,
            timestamp: new Date().toISOString()
        }));

        alert('✅ Saved to Reports successfully!');
    }

    function downloadInstantReport(energy, cost, carbon, isPeakHour) {
        const report = `Smart Energy Report\n--------------------------\nEnergy: ${energy.toFixed(2)} kWh\nCost: ₹${cost.toFixed(2)}\nPeak Hour: ${isPeakHour}`;
        const blob = new Blob([report], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `report_${Date.now()}.txt`;
        link.click();
    }
    
    function downloadForecastReport(energy, cost, carbon, days) {
        const report = `Smart Energy Forecast (${days} Days)\n--------------------------\nTotal Energy: ${energy.toFixed(2)} kWh\nTotal Cost: ₹${cost.toFixed(2)}`;
        const blob = new Blob([report], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `forecast_${Date.now()}.txt`;
        link.click();
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateUserUI();
    });
</script>
