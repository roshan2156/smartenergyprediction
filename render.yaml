services:
  - type: web
    name: smart-energy-monitor
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-energy-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.12

databases:
  - name: smart-energy-db
    databaseName: smart_energy
    user: smart_energy_user