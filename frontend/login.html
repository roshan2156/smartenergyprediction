<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Energy Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2ecc71; --primary-dark: #27ae60; --secondary: #3498db; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .login-container { max-width: 450px; width: 100%; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: white; border: none; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .card-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; text-align: center; padding: 40px 20px; }
        .energy-icon { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px; border: 3px solid white; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .card-header h2 { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        .card-header p { opacity: 0.9; font-size: 14px; margin: 0; }
        .card-body { padding: 40px 30px; }
        .form-group { margin-bottom: 25px; position: relative; }
        .form-group .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #95a5a6; font-size: 16px; pointer-events: none; }
        .form-control { height: 50px; border: 2px solid #e0e0e0; border-radius: 10px; padding-left: 45px; padding-right: 45px; font-size: 14px; width: 100%; }
        .form-control:focus { border-color: var(--primary); outline: none; }
        .password-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: #95a5a6; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .password-toggle:hover { color: var(--primary); background: rgba(46,204,113,0.1); }
        .remember-forgot { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 14px; }
        .remember { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .remember input { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
        .forgot-link { color: var(--primary); text-decoration: none; font-weight: 500; }
        .btn-login { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 10px; height: 50px; font-weight: 600; font-size: 16px; color: white; width: 100%; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(46,204,113,0.3); }
        .register-link { text-align: center; margin-top: 20px; color: #7f8c8d; font-size: 14px; }
        .register-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .back-home { position: absolute; top: 20px; left: 20px; }
        .back-home a { color: white; text-decoration: none; font-size: 14px; background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 50px; display: inline-block; }
        .alert { border-radius: 10px; font-size: 14px; padding: 12px 20px; margin-bottom: 20px; border: none; }
        .alert-danger { background: #fde8e8; color: #e74c3c; border-left: 4px solid #e74c3c; }
        .alert-success { background: #e8f8f0; color: var(--primary); border-left: 4px solid var(--primary); }
        .spinner-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; justify-content: center; align-items: center; }
        .spinner-border { width: 3rem; height: 3rem; }
        @media (max-width: 576px) { .card-body { padding: 30px 20px; } .card-header { padding: 30px 20px; } .energy-icon { width: 60px; height: 60px; font-size: 30px; } }
    </style>
</head>
<body>
    <div class="back-home"><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></div>
    <div class="login-container">
        <div class="card">
            <div class="card-header">
                <div class="energy-icon"><i class="fas fa-bolt"></i></div>
                <h2>Welcome Back!</h2>
                <p>Sign in to access your energy dashboard</p>
            </div>
            <div class="card-body">
                <div id="alertContainer"></div>
                <form id="loginForm">
                    <div class="form-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="form-control" id="email" placeholder="Email Address" required>
                    </div>
                    <div class="form-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-control" id="password" placeholder="Password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()"><i class="fas fa-eye-slash" id="toggleIcon"></i></button>
                    </div>
                    <div class="remember-forgot">
                        <label class="remember"><input type="checkbox" id="remember"> <span>Remember me</span></label>
                        <a href="#" class="forgot-link" onclick="showForgotPassword(event)">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt me-2"></i>Sign In</button>
                </form>
                <div class="register-link">Don't have an account? <a href="register.html">Sign up now</a></div>
            </div>
        </div>
    </div>
    <div class="spinner-overlay" id="spinnerOverlay"><div class="spinner-border text-success" role="status"><span class="visually-hidden">Loading...</span></div><p class="text-white mt-2">Signing in...</p></div>

    <script>
        const API_URL = window.location.origin + '/api';

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (input.type === 'password') { input.type = 'text'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); }
            else { input.type = 'password'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); }
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.innerHTML = `<i class="fas fa-${type === 'danger' ? 'exclamation-circle' : 'check-circle'} me-2"></i>${message}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
            container.innerHTML = ''; container.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 5000);
        }

        function showForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            if (email) showAlert(`Password reset link sent to ${email}`, 'success');
            else showAlert('Please enter your email address to reset password', 'info');
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            if (!email || !password) {
                showAlert('Please enter email and password', 'danger');
                return;
            }
            
            document.getElementById('spinnerOverlay').style.display = 'flex';
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await response.json();
                document.getElementById('spinnerOverlay').style.display = 'none';
                
                if (result.success && result.user) {

    const userData = {
        id: result.user.id,
        name: result.user.name,
        email: result.user.email
    };

    // ✅ SAVE USER CORRECTLY
    localStorage.setItem('smart_energy_user', JSON.stringify(userData));

    window.location.href = 'home.html'; // or csv-upload.html
} else {
                    showAlert(result.message || 'Invalid email or password!', 'danger');
                }
            } catch (error) {
                document.getElementById('spinnerOverlay').style.display = 'none';
                showAlert('Cannot connect to server. Make sure backend is running on port 5000', 'danger');
            }
        });

        window.onload = function() { document.getElementById('email').focus(); };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
