<!DOCTYPE html>
<html lang="en">
<head>
    <script src="js/auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Smart Energy System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-icon i {
            font-size: 22px;
            color: white;
        }

        .logo-text h2 {
            font-size: 22px;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text p {
            font-size: 10px;
            margin: 0;
            color: #7f8c8d;
        }

        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            transition: width 0.3s;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #2ecc71;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #f8f9fa;
            padding: 8px 20px;
            border-radius: 50px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .user-name {
            font-weight: 600;
            color: #2c3e50;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1400px;
            margin: 100px auto 50px;
            padding: 20px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }

        .stat-icon i {
            font-size: 24px;
            color: white;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 13px;
        }

        /* Filter Bar */
        .filter-bar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .filter-group {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group select, .filter-group input {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-box input {
            width: 250px;
        }

        .btn-filter, .btn-export {
            background: linear-gradient(135deg, #2ecc71, #3498db);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-filter:hover, .btn-export:hover {
            transform: translateY(-2px);
        }

        .btn-clear {
            background: #95a5a6;
        }

        /* History Table */
        .history-table-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th {
            text-align: left;
            padding: 15px 12px;
            background: #f8f9fa;
            color: #2c3e50;
            font-weight: 600;
            border-bottom: 2px solid #e9ecef;
        }

        .history-table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            color: #555;
        }

        .history-table tr:hover {
            background: #f8f9fa;
        }

        .mode-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            display: inline-block;
        }

        .mode-csv { background: #3498db; color: white; }
        .mode-manual { background: #2ecc71; color: white; }
        .mode-ai { background: #9b59b6; color: white; }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-view, .btn-delete {
            padding: 4px 10px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
        }

        .btn-view {
            background: #3498db;
            color: white;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .btn-view:hover, .btn-delete:hover {
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #7f8c8d;
        }

        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 25px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 25px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
        }

        .close-modal {
            font-size: 28px;
            cursor: pointer;
            color: #7f8c8d;
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-title {
            font-weight: 600;
            color: #2c3e50;
            border-left: 3px solid #2ecc71;
            padding-left: 10px;
            margin-bottom: 10px;
        }

        .detail-item {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 15px;
                padding: 15px 20px;
            }
            .container {
                margin-top: 160px;
            }
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box input {
                width: 100%;
            }
            .history-table th, .history-table td {
                padding: 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="nav-container">
        <a href="home.html" class="logo">
            <div class="logo-icon"><i class="fas fa-bolt"></i></div>
            <div class="logo-text">
                <h2>Smart Energy System</h2>
                <p>AI-Powered Energy Intelligence</p>
            </div>
        </a>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="history.html" class="active">History</a></li>
        </ul>
        <div class="user-info" id="userInfo">
            <div class="user-avatar" id="userAvatar"><span id="avatarInitial">JD</span></div>
            <span class="user-name" id="userNameDisplay">Loading...</span>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>
</header>

<div class="container">
    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-file-csv"></i></div>
            <div class="stat-value" id="totalCSV">0</div>
            <div class="stat-label">CSV Reports</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-sliders-h"></i></div>
            <div class="stat-value" id="totalManual">0</div>
            <div class="stat-label">Manual Reports</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-robot"></i></div>
            <div class="stat-value" id="totalAI">0</div>
            <div class="stat-label">AI Reports</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
            <div class="stat-value" id="totalEnergy">0</div>
            <div class="stat-label">Total Energy (kWh)</div>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="filter-group">
            <select id="modeFilter">
                <option value="all">All Modes</option>
                <option value="csv">CSV Upload</option>
                <option value="manual">Manual Input</option>
                <option value="ai">AI Assistant</option>
            </select>
            <input type="date" id="startDate">
            <span>to</span>
            <input type="date" id="endDate">
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by energy, cost, or date..." autocomplete="off">
            <button class="btn-filter" onclick="filterHistory()"><i class="fas fa-search"></i> Search</button>
            <button class="btn-filter btn-clear" onclick="clearFilters()"><i class="fas fa-undo"></i> Clear</button>
        </div>
        <button class="btn-export" onclick="exportHistory()"><i class="fas fa-download"></i> Export All</button>
    </div>

    <!-- History Table -->
    <div class="history-table-container">
        <table class="history-table">
            <thead>
                <tr>
                    <th>Date & Time</th>
                    <th>Mode</th>
                    <th>Energy (kWh)</th>
                    <th>Cost (₹)</th>
                    <th>Carbon (kg)</th>
                    <th>Efficiency</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="historyTableBody">
                <tr>
                    <td colspan="7" class="empty-state">
                        <i class="fas fa-history"></i>
                        <p>Loading history...</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal for Details -->
<div id="detailModal" class="modal" onclick="if(event.target===this) closeModal()">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Report Details</h3>
            <span class="close-modal" onclick="closeModal()">&times;</span>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    let allHistory = [];
    let filteredHistory = [];
function updateUserUI() {
    const user = authManager.getCurrentUser();

    if (!user) {
        window.location.href = 'login.html';
        return;
    }

    const name = user.name;

    document.getElementById('userNameDisplay').textContent = name;

    const words = name.trim().split(' ');
    let initials = '';

    if (words.length === 1) {
        initials = words[0].substring(0, 2);
    } else {
        initials = words[0][0] + words[words.length - 1][0];
    }

    document.getElementById('avatarInitial').textContent = initials.toUpperCase();
}

   function logout() {
    if (confirm('Are you sure you want to logout?')) {
        authManager.logout();
    }
}
    // Load all history from localStorage
    function loadAllHistory() {
        const user = authManager.getCurrentUser();
const userId = user ? (user.id || user.name) : 'guest';

const manualReports = JSON.parse(localStorage.getItem(`manualReports_${userId}`) || '[]');
const aiReports = JSON.parse(localStorage.getItem(`aiReports_${userId}`) || '[]');
const csvReports = JSON.parse(localStorage.getItem(`csvReports_${userId}`) || '[]');
        // Add mode label to each report
        const csvWithMode = csvReports.map(r => ({ ...r, modeType: 'csv', modeName: 'CSV Upload' }));
        const manualWithMode = manualReports.map(r => ({ ...r, modeType: 'manual', modeName: 'Manual Input' }));
        const aiWithMode = aiReports.map(r => ({ ...r, modeType: 'ai', modeName: 'AI Assistant' }));
        
        allHistory = [...csvWithMode, ...manualWithMode, ...aiWithMode];
        
        // Sort by date (newest first)
        allHistory.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        
        updateStats();
        filterHistory();
    }

    function updateStats() {
        const csvCount = allHistory.filter(h => h.modeType === 'csv').length;
        const manualCount = allHistory.filter(h => h.modeType === 'manual').length;
        const aiCount = allHistory.filter(h => h.modeType === 'ai').length;
        const totalEnergy = allHistory.reduce((sum, h) => sum + (parseFloat(h.totalEnergy || h.energy || 0)), 0);
        
        document.getElementById('totalCSV').innerHTML = csvCount;
        document.getElementById('totalManual').innerHTML = manualCount;
        document.getElementById('totalAI').innerHTML = aiCount;
        document.getElementById('totalEnergy').innerHTML = totalEnergy.toFixed(1);
    }

    function filterHistory() {
        const modeFilter = document.getElementById('modeFilter').value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        filteredHistory = allHistory.filter(item => {
            // Mode filter
            if (modeFilter !== 'all' && item.modeType !== modeFilter) return false;
            
            // Date filter
            if (startDate) {
                const itemDate = new Date(item.timestamp).toISOString().split('T')[0];
                if (itemDate < startDate) return false;
            }
            if (endDate) {
                const itemDate = new Date(item.timestamp).toISOString().split('T')[0];
                if (itemDate > endDate) return false;
            }
            
            // Search filter
            if (searchTerm) {
                const energy = (item.totalEnergy || item.energy || '').toString();
                const cost = (item.totalCost || item.cost || '').toString();
                const date = new Date(item.timestamp).toLocaleString().toLowerCase();
                if (!energy.includes(searchTerm) && !cost.includes(searchTerm) && !date.includes(searchTerm)) {
                    return false;
                }
            }
            
            return true;
        });
        
        displayHistory();
    }

    function displayHistory() {
        const tbody = document.getElementById('historyTableBody');
        
        if (filteredHistory.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="7" class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <p>No history records found</p>
                        <small>Go to CSV Upload, Manual Input, or AI Assistant to create predictions</small>
                    </td>
                </tr>
            `;
            return;
        }
        
        tbody.innerHTML = filteredHistory.map(item => {
            const energy = item.totalEnergy || item.energy || 'N/A';
            const cost = item.totalCost || item.cost || 'N/A';
            const carbon = item.totalCarbon || item.carbon || 'N/A';
            const efficiency = item.efficiencyScore || (item.efficiency ? item.efficiency : 'N/A');
            const date = new Date(item.timestamp).toLocaleString();
            
            let modeClass = '';
            if (item.modeType === 'csv') modeClass = 'mode-csv';
            else if (item.modeType === 'manual') modeClass = 'mode-manual';
            else modeClass = 'mode-ai';
            
            return `
                <tr>
                    <td>${date}</td>
                    <td><span class="mode-badge ${modeClass}">${item.modeName}</span></td>
                    <td>${typeof energy === 'number' ? energy.toFixed(2) : energy}</td>
                    <td>₹${typeof cost === 'number' ? cost.toFixed(2) : cost}</td>
                    <td>${typeof carbon === 'number' ? carbon.toFixed(2) : carbon}</td>
                    <td>${typeof efficiency === 'number' ? efficiency + '%' : efficiency}</td>
                    <td class="action-buttons">
                        <button class="btn-view" onclick="viewDetails(${item.id})"><i class="fas fa-eye"></i> View</button>
                        <button class="btn-delete" onclick="deleteHistory(${item.id})"><i class="fas fa-trash"></i> Del</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function viewDetails(id) {
        const report = allHistory.find(r => r.id === id);
        if (!report) return;
        
        const energy = report.totalEnergy || report.energy || 'N/A';
        const cost = report.totalCost || report.cost || 'N/A';
        const carbon = report.totalCarbon || report.carbon || 'N/A';
        const efficiency = report.efficiencyScore || (report.efficiency ? report.efficiency : 'N/A');
        const date = new Date(report.timestamp).toLocaleString();
        
        let alertsHtml = '';
        let recommendationsHtml = '';
        let wasteHtml = '';
        
        if (report.alerts && report.alerts.length) {
            alertsHtml = report.alerts.map(a => `<div class="detail-item"><i class="fas fa-exclamation-triangle text-warning"></i> ${a}</div>`).join('');
        } else {
            alertsHtml = `<div class="detail-item"><i class="fas fa-check-circle text-success"></i> No critical alerts</div>`;
        }
        
        if (report.recommendations && report.recommendations.length) {
            recommendationsHtml = report.recommendations.map(r => `<div class="detail-item"><i class="fas fa-check-circle text-success"></i> ${r}</div>`).join('');
        } else {
            recommendationsHtml = `
                <div class="detail-item"><i class="fas fa-check-circle text-success"></i> Set AC to 24°C for optimal efficiency</div>
                <div class="detail-item"><i class="fas fa-check-circle text-success"></i> Shift usage to off-peak hours (8-11 AM)</div>
            `;
        }
        
        if (report.wasteDetected && report.wasteDetected.length) {
            wasteHtml = `
                <div class="detail-section">
                    <div class="detail-title">🗑️ Waste Detection</div>
                    ${report.wasteDetected.map(w => `<div class="detail-item"><i class="fas fa-trash-alt text-danger"></i> ${w}</div>`).join('')}
                </div>
            `;
        }
        
        const modalBody = document.getElementById('modalBody');
        document.getElementById('modalTitle').innerHTML = `${report.modeName} Report - ${date}`;
        
        modalBody.innerHTML = `
            <div class="detail-section">
                <div class="detail-title">📊 Energy Summary</div>
                <div class="detail-item"><strong>Energy:</strong> ${typeof energy === 'number' ? energy.toFixed(2) : energy} kWh</div>
                <div class="detail-item"><strong>Cost:</strong> ₹${typeof cost === 'number' ? cost.toFixed(2) : cost}</div>
                <div class="detail-item"><strong>Carbon:</strong> ${typeof carbon === 'number' ? carbon.toFixed(2) : carbon} kg CO₂</div>
                <div class="detail-item"><strong>Efficiency Score:</strong> ${typeof efficiency === 'number' ? efficiency + '%' : efficiency}</div>
                ${report.peakHour ? `<div class="detail-item"><strong>Peak Hour:</strong> ${report.peakHour}</div>` : ''}
                ${report.highestAppliance ? `<div class="detail-item"><strong>Highest Appliance:</strong> ${report.highestAppliance}</div>` : ''}
            </div>
            
            <div class="detail-section">
                <div class="detail-title">⚠️ Alerts</div>
                ${alertsHtml}
            </div>
            
            <div class="detail-section">
                <div class="detail-title">💡 Recommendations</div>
                ${recommendationsHtml}
            </div>
            
            ${wasteHtml}
            
            <div class="detail-section">
                <div class="detail-title">🌱 Environmental Impact</div>
                <div class="detail-item">Monthly Carbon: ${(parseFloat(carbon) * 30).toFixed(2)} kg CO₂</div>
                <div class="detail-item">Plant ${Math.floor(parseFloat(carbon) * 30 / 20)} trees to offset yearly</div>
            </div>
        `;
        
        document.getElementById('detailModal').style.display = 'flex';
    }

    function deleteHistory(id) {
    const user = authManager.getCurrentUser();
    const userId = user ? (user.id || user.name) : 'guest';

    if (confirm('Are you sure you want to delete this report?')) {
        const report = allHistory.find(r => r.id === id);
        if (!report) return;

        let storageKey = '';
        if (report.modeType === 'csv') storageKey = `csvReports_${userId}`;
        else if (report.modeType === 'manual') storageKey = `manualReports_${userId}`;
        else storageKey = `aiReports_${userId}`;

        let reports = JSON.parse(localStorage.getItem(storageKey) || '[]');
        reports = reports.filter(r => r.id !== id);
        localStorage.setItem(storageKey, JSON.stringify(reports));

        loadAllHistory();
        alert('Report deleted successfully!');
    }
}
    function clearFilters() {
        document.getElementById('modeFilter').value = 'all';
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        document.getElementById('searchInput').value = '';
        filterHistory();
    }

    function exportHistory() {
        if (filteredHistory.length === 0) {
            alert('No records to export!');
            return;
        }
        
        // Create CSV content
        const headers = ['Date', 'Mode', 'Energy (kWh)', 'Cost (₹)', 'Carbon (kg)', 'Efficiency Score (%)', 'Peak Hour', 'Highest Appliance', 'Alerts', 'Recommendations'];
        
        const rows = filteredHistory.map(item => {
            const energy = item.totalEnergy || item.energy || 'N/A';
            const cost = item.totalCost || item.cost || 'N/A';
            const carbon = item.totalCarbon || item.carbon || 'N/A';
            const efficiency = item.efficiencyScore || 'N/A';
            const peakHour = item.peakHour || (item.isPeakHour ? 'Yes' : 'No');
            const highestAppliance = item.highestAppliance || 'N/A';
            const alerts = item.alerts ? item.alerts.join('; ') : 'No alerts';
            const recommendations = item.recommendations ? item.recommendations.join('; ') : 'Standard recommendations';
            
            return [
                new Date(item.timestamp).toLocaleString(),
                item.modeName,
                energy,
                cost,
                carbon,
                efficiency,
                peakHour,
                highestAppliance,
                `"${alerts}"`,
                `"${recommendations}"`
            ];
        });
        
        const csvContent = [headers, ...rows].map(row => row.join(',')).join('\n');
        
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute('download', `energy_history_${new Date().toISOString().slice(0,19)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        
        alert('History exported successfully!');
    }

    function closeModal() {
        document.getElementById('detailModal').style.display = 'none';
    }

    // Set default date range to last 30 days
    function setDefaultDateRange() {
        const today = new Date();
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(today.getDate() - 30);
        document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];
        document.getElementById('endDate').value = today.toISOString().split('T')[0];
    }

    // Initialize
    window.addEventListener('load', function() {
        updateUserUI();
        loadAllHistory();
        setDefaultDateRange();
    });
    
    // Add search on enter key
    
    document.addEventListener('DOMContentLoaded', () => {
    updateUserUI();
});
</script>
